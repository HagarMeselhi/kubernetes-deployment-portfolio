name: Kubernetes CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate-kubernetes-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate manifests with kubeconform
        run: |
          docker run --rm \
            -v "${PWD}:/work" \
            -w /work \
            ghcr.io/yannh/kubeconform:latest \
            -strict \
            -summary \
            k8s/namespace.yaml \
            k8s/configmap.yaml \
            k8s/secret.yaml \
            k8s/deployment.yaml \
            k8s/service.yaml \
            k8s/ingress.yaml \
            k8s/hpa.yaml
